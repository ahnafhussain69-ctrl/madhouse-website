<!DOCTYPE html>
<html>
<head>
    <title>MadHouse Restaurant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS link -->
    <link rel="stylesheet" href="madhouse.css">
</head>

<body>

<header>
    <h1>MadHouse 🍔</h1>
    <p>Crazy Taste, Unforgettable Experience!</p>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Contact</a>
</nav>

<section id="home">
    <h2>Welcome to MadHouse</h2>
    <p>Best fast food in town. Enjoy your meal!</p>
</section>

<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu">

        <div class="item">
            <h3>Beef Burger</h3>
            <p>180 BDT</p>
            <button onclick="orderItem('Beef Burger')">Order</button>
        </div>

        <div class="item">
            <h3>Chicken Burger</h3>
            <p>150 BDT</p>
            <button onclick="orderItem('Chicken Burger')">Order</button>
        </div>

        <div class="item">
            <h3>Pizza</h3>
            <p>350 BDT</p>
            <button onclick="orderItem('Pizza')">Order</button>
        </div>

        <div class="item">
            <h3>Chicken Fry</h3>
            <p>280 BDT</p>
            <button onclick="orderItem('Chicken Fry')">Order</button>
        </div>

    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>📞 01864444222</p>
    <p>📍 Bangladesh</p>
</section>

<footer>
    <p>© 2026 MadHouse Restaurant</p>
</footer>

<!-- JS link -->
<script src="script.js"></script>

</body>
</html>
